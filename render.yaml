services:
  # ---- Django backend (REST API) ----
  - type: web
    name: eventhub-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: "2"

  # ---- React + Vite frontend (static site) ----
  - type: web
    name: eventhub-frontend
    runtime: static
    rootDir: frontend
    buildCommand: "npm ci && npm run build"
    staticPublishPath: dist
    envVars:
      # Points the built bundle at the backend service's host
      - key: VITE_API_URL
        fromService:
          type: web
          name: eventhub-backend
          property: host
    routes:
      # SPA fallback: serve index.html for client-side routes
      - type: rewrite
        source: /*
        destination: /index.html
